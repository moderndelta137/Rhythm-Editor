<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rhythm Studio — iPhone 16 Pro Max Simulator</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      min-width: 100%;
      min-height: 100%;
      margin: 0;
      background: #10131a;
      color: #eaf3ff;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: start center;
      padding: 18px;
      overflow: auto;
    }

    .simulator {
      width: 476px;
      padding: 10px 18px 18px;
      border: 1px solid #3e4759;
      border-radius: 34px;
      background: #05070b;
      box-shadow: 0 20px 54px rgba(0, 0, 0, 0.48);
    }

    .simulator-label {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #9ca9bd;
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    .simulator-label strong {
      color: #dce9fa;
      font-size: 12px;
    }

    iframe {
      display: block;
      width: 440px;
      height: 956px;
      border: 1px solid #303849;
      border-radius: 22px;
      background: #0f1219;
    }
  </style>
</head>
<body>
  <main class="simulator">
    <div class="simulator-label">
      <strong>iPhone 16 Pro Max</strong>
      <span>440 × 956 CSS px</span>
    </div>
    <iframe src="rhythm_studio.html" title="Rhythm Studio mobile preview"></iframe>
  </main>
</body>
</html>
